allowBuilds:
  sharp: true

# ==============================================================================
# PNPM WORKSPACE CONFIGURATION
# ==============================================================================

# Single-package workspace — the root is the only package.
# No monorepo packages (no apps/*, no packages/*).

# PRE-INSTALL SECURITY — SUPPLY CHAIN PROTECTION
# ------------------------------------------------------------------------------

# Blocks packages less than 1.5 days old (2160 minutes).
# Mitigates zero-day attacks from freshly published malicious packages.
minimumReleaseAge: 2160

# Safe-by-default execution policy. Errors out immediately if an unlisted
# package requires a build script, instead of failing silently.
strictDepBuilds: true

# Explicit whitelist of packages allowed to run postinstall/build scripts.
# All other packages are blocked from executing code at install time.
onlyBuiltDependencies:
  - esbuild
  - sharp
