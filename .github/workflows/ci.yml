name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

# Best practice: Limit security privileges
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:ci

      - name: Run integration tests
        run: pnpm test:integration

      - name: Build project
        run: pnpm build

      - name: Pack dry-run
        run: pnpm pack:dry-run

      - name: Smoke test (CLI commands)
        run: node ./bin/better-ui.js /commands

      - name: Security audit
        run: pnpm audit --audit-level=high || true
